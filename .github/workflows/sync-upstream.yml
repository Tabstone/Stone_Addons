name: Sync upstream versions

on:
  workflow_dispatch:
    inputs:
      bump_wrapper:
        description: "Bump wrapper revision for all add-ons"
        required: false
        default: "false"
  schedule:
    - cron: '17 3 * * *'

concurrency:
  group: sync-upstream
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Fetch upstream versions from Docker Hub
        id: upstream
        run: |
          # Generic function: poll Docker Hub for latest versioned tag
          get_dockerhub_latest() {
            local repo="$1"
            curl -fsSL "https://hub.docker.com/v2/repositories/${repo}/tags/?page_size=50&ordering=last_updated" | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          tags = [r['name'] for r in data.get('results', []) if r['name'] not in ('latest', 'dev', 'nightly', 'beta')]

          def parse_full(tag):
            m = re.match(r'^v?(\d+)\.(\d+)\.(\d+)$', tag)
            return (int(m.group(1)), int(m.group(2)), int(m.group(3))) if m else None

          def parse_partial(tag):
            m = re.match(r'^v?(\d+)\.(\d+)$', tag)
            return (int(m.group(1)), int(m.group(2)), 0) if m else None

          full = [(parse_full(t), t) for t in tags if parse_full(t)]
          if full:
            print(max(full, key=lambda item: item[0])[1])
            raise SystemExit(0)

          partial = [(parse_partial(t), t) for t in tags if parse_partial(t)]
          if partial:
            print(max(partial, key=lambda item: item[0])[1])
            raise SystemExit(0)

          print(tags[0] if tags else '')
          " 2>/dev/null || echo ""
          }

          # GitHub tags (GHCR often requires auth, use repo tags)
          get_github_latest_tag() {
            local repo="$1"
            curl -fsSL "https://api.github.com/repos/${repo}/tags?per_page=100" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data[0]['name'] if data else '')
          " 2>/dev/null || echo ""
          }

          # Public GHCR packages: use registry tag list, not GitHub Packages API.
          get_ghcr_latest() {
            local image="$1"
            local token
            token=$(curl -fsSL "https://ghcr.io/token?scope=repository:${image}:pull" | python3 -c "
          import sys, json
          print(json.load(sys.stdin).get('token', ''))
          " 2>/dev/null || echo "")
            if [ -z "$token" ]; then
              echo ""
              return
            fi
            curl -fsSL -H "Authorization: Bearer ${token}" "https://ghcr.io/v2/${image}/tags/list" | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          tags = [t for t in data.get('tags', []) if t not in ('latest', 'main', 'dev', 'nightly', 'beta')]

          def parse_full(tag):
            m = re.match(r'^v?(\d+)\.(\d+)\.(\d+)$', tag)
            return (int(m.group(1)), int(m.group(2)), int(m.group(3))) if m else None

          full = [(parse_full(t), t) for t in tags if parse_full(t)]
          if full:
            print(max(full, key=lambda item: item[0])[1])
            raise SystemExit(0)

          print(tags[-1] if tags else '')
          " 2>/dev/null || echo ""
          }

          TR_TAG=$(get_dockerhub_latest "wantcat/trendradar")
          echo "trendradar_tag=$TR_TAG" >> "$GITHUB_OUTPUT"
          echo "trendradar=${TR_TAG#v}" >> "$GITHUB_OUTPUT"

          MCP_TAG=$(get_dockerhub_latest "wantcat/trendradar-mcp")
          echo "trendradar_mcp_tag=$MCP_TAG" >> "$GITHUB_OUTPUT"
          echo "trendradar_mcp=${MCP_TAG#v}" >> "$GITHUB_OUTPUT"

          CLI_TAG=$(get_dockerhub_latest "eceasy/cli-proxy-api")
          echo "cli_proxy_api_tag=$CLI_TAG" >> "$GITHUB_OUTPUT"
          echo "cli_proxy_api=${CLI_TAG#v}" >> "$GITHUB_OUTPUT"

          CPA_MANAGER_PLUS_TAG=$(get_dockerhub_latest "seakee/cpa-manager-plus")
          echo "cpa_manager_plus_tag=$CPA_MANAGER_PLUS_TAG" >> "$GITHUB_OUTPUT"
          echo "cpa_manager_plus=${CPA_MANAGER_PLUS_TAG#v}" >> "$GITHUB_OUTPUT"

          AXONHUB_TAG=$(get_dockerhub_latest "looplj/axonhub")
          echo "axonhub_tag=$AXONHUB_TAG" >> "$GITHUB_OUTPUT"
          echo "axonhub=${AXONHUB_TAG#v}" >> "$GITHUB_OUTPUT"

          DRPY_NODE_TAG=$(get_ghcr_latest "hjdhnx/drpy-node")
          echo "drpy_node_tag=$DRPY_NODE_TAG" >> "$GITHUB_OUTPUT"
          echo "drpy_node=${DRPY_NODE_TAG#v}" >> "$GITHUB_OUTPUT"

          ATVLOADLY_TAG=$(get_ghcr_latest "bitxeno/atvloadly")
          echo "atvloadly_tag=$ATVLOADLY_TAG" >> "$GITHUB_OUTPUT"
          echo "atvloadly=${ATVLOADLY_TAG#v}" >> "$GITHUB_OUTPUT"

          MRS_TAG=$(get_ghcr_latest "thenetsky/microsoft-rewards-script")
          echo "microsoft_rewards_script_tag=$MRS_TAG" >> "$GITHUB_OUTPUT"
          echo "microsoft_rewards_script=${MRS_TAG#v}" >> "$GITHUB_OUTPUT"

          MIHOMO_TAG=$(get_dockerhub_latest "metacubex/mihomo")
          echo "mihomo_tag=$MIHOMO_TAG" >> "$GITHUB_OUTPUT"
          echo "mihomo=${MIHOMO_TAG#v}" >> "$GITHUB_OUTPUT"

          METACUBEXD_TAG=$(get_github_latest_tag "MetaCubeX/metacubexd")
          echo "metacubexd_tag=$METACUBEXD_TAG" >> "$GITHUB_OUTPUT"
          echo "metacubexd=${METACUBEXD_TAG#v}" >> "$GITHUB_OUTPUT"

          SUB2API_TAG=$(get_dockerhub_latest "weishaw/sub2api")
          echo "sub2api_tag=$SUB2API_TAG" >> "$GITHUB_OUTPUT"
          echo "sub2api=${SUB2API_TAG#v}" >> "$GITHUB_OUTPUT"

          METAPI_TAG=$(get_dockerhub_latest "1467078763/metapi")
          echo "metapi_tag=$METAPI_TAG" >> "$GITHUB_OUTPUT"
          echo "metapi=${METAPI_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update addon metadata
        id: update
        env:
          TRENDRADAR_VERSION: ${{ steps.upstream.outputs.trendradar }}
          TRENDRADAR_TAG: ${{ steps.upstream.outputs.trendradar_tag }}
          TRENDRADAR_MCP_VERSION: ${{ steps.upstream.outputs.trendradar_mcp }}
          TRENDRADAR_MCP_TAG: ${{ steps.upstream.outputs.trendradar_mcp_tag }}
          CLI_PROXY_API_VERSION: ${{ steps.upstream.outputs.cli_proxy_api }}
          CLI_PROXY_API_TAG: ${{ steps.upstream.outputs.cli_proxy_api_tag }}
          CPA_MANAGER_PLUS_VERSION: ${{ steps.upstream.outputs.cpa_manager_plus }}
          CPA_MANAGER_PLUS_TAG: ${{ steps.upstream.outputs.cpa_manager_plus_tag }}
          AXONHUB_VERSION: ${{ steps.upstream.outputs.axonhub }}
          AXONHUB_TAG: ${{ steps.upstream.outputs.axonhub_tag }}
          DRPY_NODE_VERSION: ${{ steps.upstream.outputs.drpy_node }}
          DRPY_NODE_TAG: ${{ steps.upstream.outputs.drpy_node_tag }}
          ATVLOADLY_VERSION: ${{ steps.upstream.outputs.atvloadly }}
          ATVLOADLY_TAG: ${{ steps.upstream.outputs.atvloadly_tag }}
          MICROSOFT_REWARDS_SCRIPT_VERSION: ${{ steps.upstream.outputs.microsoft_rewards_script }}
          MICROSOFT_REWARDS_SCRIPT_TAG: ${{ steps.upstream.outputs.microsoft_rewards_script_tag }}
          MIHOMO_VERSION: ${{ steps.upstream.outputs.mihomo }}
          MIHOMO_TAG: ${{ steps.upstream.outputs.mihomo_tag }}
          METACUBEXD_VERSION: ${{ steps.upstream.outputs.metacubexd }}
          METACUBEXD_TAG: ${{ steps.upstream.outputs.metacubexd_tag }}
          SUB2API_VERSION: ${{ steps.upstream.outputs.sub2api }}
          SUB2API_TAG: ${{ steps.upstream.outputs.sub2api_tag }}
          METAPI_VERSION: ${{ steps.upstream.outputs.metapi }}
          METAPI_TAG: ${{ steps.upstream.outputs.metapi_tag }}
          BUMP_WRAPPER: ${{ github.event.inputs.bump_wrapper || 'false' }}
          GH_API_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/sync_upstream_metadata.py

      - name: Create pull request
        id: create_pr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT }}
          commit-message: "chore: sync upstream addon versions"
          branch: chore/sync-upstream-versions
          delete-branch: true
          title: "chore: sync upstream addon versions"
          body: |
            ## Summary
            - sync upstream image versions for all add-ons (source: upstream registries)
            - update wrapper addon versions
            - append changelog entries

      - name: Dispatch addon metadata workflow
        if: steps.update.outputs.changed == 'true' && steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          GITHUB_TOKEN: ${{ secrets.PAT }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)
          if [ -z "$PR_BRANCH" ]; then
            printf 'Unable to resolve PR head branch for PR %s.\n' "$PR_NUMBER"
            exit 1
          fi
          gh workflow run addon-metadata.yml --ref "$PR_BRANCH"

      - name: Wait for addon metadata workflow
        if: steps.update.outputs.changed == 'true' && steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          GITHUB_TOKEN: ${{ secrets.PAT }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          WORKFLOW_NAME="addon-metadata.yml"
          TIMEOUT_SECONDS=900
          start_time=$(date +%s)

          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)
          if [ -z "$PR_BRANCH" ]; then
            printf 'Unable to resolve PR head branch for PR %s.\n' "$PR_NUMBER"
            exit 1
          fi

          while true; do
            if ! run_json=$(gh run list --workflow "$WORKFLOW_NAME" --branch "$PR_BRANCH" --limit 1 --json status,conclusion,createdAt 2>&1); then
              printf 'Failed to list workflow runs: %s\n' "$run_json"
              exit 1
            fi
            status=$(echo "$run_json" | python3 -c "import json,sys; data=json.load(sys.stdin); run=data[0] if data else {}; print(run.get('status',''))")
            conclusion=$(echo "$run_json" | python3 -c "import json,sys; data=json.load(sys.stdin); run=data[0] if data else {}; print(run.get('conclusion',''))")

            if [ -z "$status" ]; then
              elapsed=$(( $(date +%s) - start_time ))
              if [ "$elapsed" -ge "$TIMEOUT_SECONDS" ]; then
                printf 'Timed out after %s seconds waiting for workflow "%s" to appear.\n' "$TIMEOUT_SECONDS" "$WORKFLOW_NAME"
                exit 1
              fi
              sleep 5
              continue
            fi

            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                break
              fi
              printf 'Workflow "%s" completed with conclusion: %s\n' "$WORKFLOW_NAME" "$conclusion"
              exit 1
            fi

            elapsed=$(( $(date +%s) - start_time ))
            if [ "$elapsed" -ge "$TIMEOUT_SECONDS" ]; then
              printf 'Timed out after %s seconds waiting for workflow "%s" to complete.\n' "$TIMEOUT_SECONDS" "$WORKFLOW_NAME"
              exit 1
            fi
            sleep 5
          done

      - name: Merge pull request
        if: steps.update.outputs.changed == 'true' && steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          GITHUB_TOKEN: ${{ secrets.PAT }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: gh pr merge "$PR_NUMBER" --squash --delete-branch
